<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compartir cotxe · Paso Ecuador UPF 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ========================================================
       CAPÇALERA
  ======================================================== -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-brand">
          <span class="header-icon" aria-hidden="true">⬡</span>
          <div>
            <h1 class="event-title">Paso Ecuador UPF 2026</h1>
            <p class="event-meta">9 i 10 de Maig · Masia el Pinatar</p>
          </div>
        </div>
        <p class="header-tagline">Compartir cotxe</p>
      </div>

      <div class="stats-bar" role="status" aria-label="Resum d'ofertes">
        <div class="stat">
          <span class="stat__number" id="stat-offers">—</span>
          <span class="stat__label">Ofertes actives</span>
        </div>
        <div class="stat__divider" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat__number stat__number--green" id="stat-seats">—</span>
          <span class="stat__label">Places lliures</span>
        </div>
        <div class="stat__divider" aria-hidden="true"></div>
        <div class="stat">
          <span class="stat__number" id="stat-passengers">—</span>
          <span class="stat__label">Persones apuntades</span>
        </div>
      </div>
    </div>
  </header>


  <!-- ========================================================
       CONTINGUT PRINCIPAL
  ======================================================== -->
  <main class="container main-content">

    <!-- CTA afegir oferta -->
    <div class="add-trigger">
      <button class="btn btn--cta" id="toggle-form-btn" aria-expanded="false" aria-controls="add-ride-form">
        <span class="toggle-icon" aria-hidden="true">+</span>
        Ofereixo cotxe
      </button>
      <p class="add-hint">Les places s'actualitzen en temps real per a tots.</p>
    </div>


    <!-- Formulari afegir oferta (ocult per defecte) -->
    <section
      id="add-ride-form"
      class="add-ride-form"
      aria-label="Afegir nova oferta de cotxe"
      aria-hidden="true"
    >
      <h2 class="form-title">Nova oferta</h2>

      <div class="form-grid">

        <div class="form-field">
          <label for="f-driver">Nom del conductor <abbr title="obligatori">*</abbr></label>
          <input
            type="text"
            id="f-driver"
            name="driver"
            placeholder="Anna García"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-field">
          <label for="f-origin">Zona de sortida <abbr title="obligatori">*</abbr></label>
          <input
            type="text"
            id="f-origin"
            name="origin"
            placeholder="Gràcia, Barcelona"
            required
          />
        </div>

        <div class="form-field">
          <label for="f-time">Hora de sortida</label>
          <input type="time" id="f-time" name="time" value="10:00" />
        </div>

        <div class="form-field">
          <label for="f-seats">Places disponibles</label>
          <select id="f-seats" name="seats">
            <option value="1">1 plaça</option>
            <option value="2">2 places</option>
            <option value="3" selected>3 places</option>
            <option value="4">4 places</option>
            <option value="5">5 places</option>
            <option value="6">6 places</option>
            <option value="7">7 places</option>
            <option value="8">8 places</option>
          </select>
        </div>

        <div class="form-field form-field--full">
          <label for="f-contact">Contacte <abbr title="obligatori">*</abbr></label>
          <input
            type="text"
            id="f-contact"
            name="contact"
            placeholder="@usuari_telegram o 612 345 678"
            required
          />
        </div>

        <div class="form-field form-field--full">
          <label for="f-notes">Notes <span class="label-optional">(opcional)</span></label>
          <textarea
            id="f-notes"
            name="notes"
            rows="2"
            placeholder="Punt de recollida, observacions..."
          ></textarea>
        </div>

      </div><!-- /.form-grid -->

      <div class="form-actions">
        <button class="btn btn--cta" id="submit-ride-btn" type="button">
          Publicar oferta
        </button>
        <button class="btn btn--ghost" id="cancel-ride-btn" type="button">
          Cancel·lar
        </button>
      </div>

    </section><!-- /#add-ride-form -->


    <!-- Indicador de càrrega -->
    <div id="loading-indicator" class="loading" style="display:none" role="status" aria-label="Carregant">
      <span class="loading__dot"></span>
      <span class="loading__dot"></span>
      <span class="loading__dot"></span>
    </div>


    <!-- Llista d'ofertes -->
    <div class="list-header">
      <h2 class="list-title">Ofertes de cotxe</h2>
    </div>
    <div id="rides-list" class="rides-list"></div>

  </main>


  <!-- ========================================================
       MODAL — UNIR-SE A UN COTXE
  ======================================================== -->
  <div
    id="modal-overlay"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-heading"
    style="display:none"
  >
    <div class="modal">
      <button class="modal__close" id="cancel-join-btn" aria-label="Tancar">×</button>
      <h2 class="modal__title" id="modal-heading">Uneix-te a aquest cotxe</h2>
      <p class="modal__ride-info" id="modal-ride-info"></p>

      <div class="form-field">
        <label for="modal-name">El teu nom</label>
        <input
          type="text"
          id="modal-name"
          placeholder="El teu nom complet"
          autocomplete="name"
        />
      </div>

      <div class="modal__actions">
        <button class="btn btn--cta" id="confirm-join-btn" type="button">Confirmar</button>
        <button class="btn btn--ghost" id="cancel-join-btn-2" type="button">Cancel·lar</button>
      </div>
    </div>
  </div>


  <!-- Toast de notificacions -->
  <div id="toast" class="toast" role="alert" aria-live="polite" aria-atomic="true"></div>


  <script type="module" src="js/app.js"></script>

</body>
</html>
